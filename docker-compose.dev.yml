# APISIX Gateway - Development Environment Overrides
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  apisix:
    ports:
      - "127.0.0.1:9080:9080"  # Gateway port
      - "127.0.0.1:9180:9180"  # Admin API (localhost only for security)

  portal-backend:
    ports:
      - "127.0.0.1:3001:3000"  # Portal backend (localhost only)
    environment:
      APISIX_ADMIN_API_CONTAINER: "http://apisix:9180/apisix/admin"

  # Kafka - Event streaming for billing events (KRaft mode, no Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - apisix
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
