networks:
  apisix-dev:
    driver: bridge

volumes:
  etcd_data_dev:
  apisix_logs_dev:

services:
  etcd-dev:
    image: bitnamilegacy/etcd:3.5.11
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-dev:2379
    volumes:
      - etcd_data_dev:/bitnami/etcd
    networks:
      - apisix-dev
    restart: unless-stopped

  apisix-dev:
    build:
      context: ./apisix
      dockerfile: Dockerfile
    depends_on:
      - etcd-dev
    networks:
      - apisix-dev
    ports:
      - "9080:9080"
      - "9180:9180"
    environment:
      - CUSTOM_PROFILE=dev
    volumes:
      - apisix_logs_dev:/usr/local/apisix/logs
    restart: unless-stopped

