networks:
  apisix-dev:
    driver: bridge

volumes:
  etcd_data_dev:
  apisix_logs_dev:

services:
  etcd-dev:
    image: bitnamilegacy/etcd:3.5.11
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-dev:2379
    volumes:
      - etcd_data_dev:/bitnami/etcd
    networks:
      - apisix-dev
    restart: unless-stopped

  apisix-dev:
    build:
      context: ./apisix
      dockerfile: Dockerfile
    depends_on:
      - etcd-dev
    networks:
      - apisix-dev
    ports:
      - "9080:9080"
      - "9180:9180"
    environment:
      - CUSTOM_PROFILE=dev
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - apisix_logs_dev:/usr/local/apisix/logs
    restart: unless-stopped
    container_name: apisix-dev

  loader-dev:
    image: curlimages/curl:latest
    depends_on:
      - apisix-dev
    networks:
      - apisix-dev
    env_file:
      - .dev.env
      - admin.env
    volumes:
      - ./:/opt/apisix-gateway:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -euo pipefail

        # Validate required environment variables
        : "$${ADMIN_KEY:?ADMIN_KEY not set}"
        : "$${AZURE_CLIENT_ID:?AZURE_CLIENT_ID not set}"
        : "$${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET not set}"
        : "$${AZURE_TENANT_ID:?AZURE_TENANT_ID not set}"
        : "$${OIDC_SESSION_SECRET:?OIDC_SESSION_SECRET not set}"

        APISIX_ADMIN="http://apisix-dev:9180"

        # Wait for APISIX Admin API
        echo "Waiting for APISIX Admin API..."
        until curl -fsS "$$APISIX_ADMIN/apisix/admin/routes" -H "X-API-KEY: $$ADMIN_KEY" >/dev/null 2>&1; do
          sleep 1
        done

        echo "Applying OIDC route..."
        # Create JSON body with env vars
        BODY=$$(cat <<EOF
        {
          "id": "oidc-auth-callback",
          "uri": "/v1/auth/oidc/callback",
          "methods": ["GET", "POST"],
          "plugins": {
            "openid-connect": {
              "client_id": "$$AZURE_CLIENT_ID",
              "client_secret": "$$AZURE_CLIENT_SECRET",
              "discovery": "https://login.microsoftonline.com/$$AZURE_TENANT_ID/v2.0/.well-known/openid-configuration",
              "scope": "openid profile email",
              "redirect_uri": "http://localhost:9080/v1/auth/oidc/callback",
              "bearer_only": false,
              "ssl_verify": false,
              "timeout": 3,
              "session": {
                "secret": "$$OIDC_SESSION_SECRET"
              }
            }
          },
          "upstream": {
            "type": "roundrobin",
            "nodes": {
              "app-backend-dev:3000": 1
            }
          }
        }
        EOF
        )

        curl -fsS -X PUT \
          -H "X-API-KEY: $$ADMIN_KEY" \
          -H "Content-Type: application/json" \
          -d "$$BODY" \
          "$$APISIX_ADMIN/apisix/admin/routes/oidc-auth-callback"

        echo "OIDC route upserted successfully."
    restart: "no"

