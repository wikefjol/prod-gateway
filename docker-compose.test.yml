# APISIX Gateway - Test Environment Overrides
# Use with: docker-compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  apisix:
    ports:
      - "127.0.0.1:9081:9080"  # Gateway port (different from dev)
      - "127.0.0.1:9181:9180"  # Admin API (localhost only for security)

  portal-backend:
    ports:
      - "127.0.0.1:3002:3000"  # Portal backend (localhost only)