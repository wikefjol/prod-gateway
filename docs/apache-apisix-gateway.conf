# Apache Virtual Host Configuration for APISIX Gateway TLS Termination
# Target: lamassu.ita.chalmers.se
# Backend: APISIX Gateway on localhost:9080

# HTTP Virtual Host - Port 80
# Handles ACME challenges and redirects to HTTPS
<VirtualHost *:80>
    ServerName lamassu.ita.chalmers.se
    DocumentRoot /var/www/html

    # Enable ACME challenge support for Let's Encrypt
    Alias /.well-known/acme-challenge /var/www/html/.well-known/acme-challenge
    <Directory "/var/www/html/.well-known/acme-challenge">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect all other traffic to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/apisix-gateway-http-error.log
    CustomLog ${APACHE_LOG_DIR}/apisix-gateway-http-access.log combined
</VirtualHost>

# HTTPS Virtual Host - Port 443
# TLS termination and reverse proxy to APISIX Gateway
<VirtualHost *:443>
    ServerName lamassu.ita.chalmers.se

    # SSL Configuration (will be managed by Certbot)
    SSLEngine on
    # Certbot will add SSL certificate configuration here

    # Modern SSL Security Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Reverse Proxy Configuration to APISIX Gateway
    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy all requests to APISIX Gateway on localhost:9080
    ProxyPass / http://127.0.0.1:9080/
    ProxyPassReverse / http://127.0.0.1:9080/

    # Forward real client information to APISIX
    ProxyPassReverse / http://127.0.0.1:9080/
    ProxyPreserveHost On

    # Add headers for APISIX to understand the original request
    <Proxy *>
        Order allow,deny
        Allow from all

        # Forward original client IP and protocol information
        ProxySet X-Forwarded-Proto "https"
        ProxySet X-Forwarded-Port "443"
        ProxyAddHeaders On
    </Proxy>

    # Handle WebSocket connections (if needed for future features)
    RewriteEngine On
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:9080/$1 [P,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/apisix-gateway-https-error.log
    CustomLog ${APACHE_LOG_DIR}/apisix-gateway-https-access.log combined

    # Log additional proxy information for debugging
    LogLevel warn
    LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\" %D" combined_with_time
    CustomLog ${APACHE_LOG_DIR}/apisix-gateway-proxy.log combined_with_time
</VirtualHost>

# SSL Configuration - Global Settings
# These settings apply to all SSL-enabled virtual hosts
SSLUseStapling On
SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"

# Disable HTTP TRACE method for security
TraceEnable Off

# Hide Apache version information
ServerTokens Prod
ServerSignature Off