# Apache Bootstrap Configuration - HTTP Only
# This config works BEFORE certbot runs
# Target: lamassu.ita.chalmers.se
# Backend: APISIX Gateway on localhost:9080

# HTTP Virtual Host - Port 80 ONLY
# Handles ACME challenges and temporary access until SSL is set up
<VirtualHost *:80>
    ServerName lamassu.ita.chalmers.se
    DocumentRoot /var/www/html

    # Enable ACME challenge support for Let's Encrypt
    Alias /.well-known/acme-challenge /var/www/html/.well-known/acme-challenge
    <Directory "/var/www/html/.well-known/acme-challenge">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Temporarily proxy to APISIX for testing (will redirect to HTTPS after certbot)
    ProxyPreserveHost On
    ProxyRequests Off

    # Skip ACME challenges from proxy
    ProxyPassMatch ^/.well-known/acme-challenge/ !

    # Proxy everything else to APISIX Gateway
    ProxyPass / http://127.0.0.1:9080/
    ProxyPassReverse / http://127.0.0.1:9080/

    # Add headers for APISIX
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/apisix-gateway-http-error.log
    CustomLog ${APACHE_LOG_DIR}/apisix-gateway-http-access.log combined
</VirtualHost>

# Basic security settings (no SSL-specific config yet)
TraceEnable Off
ServerTokens Prod
ServerSignature Off