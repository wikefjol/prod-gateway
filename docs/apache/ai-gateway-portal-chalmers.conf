# Apache Virtual Host Configuration for APISIX Gateway - Test Environment
# Target: ai-gateway.portal.chalmers.se
# Backend: APISIX Gateway test environment on localhost:9081

# HTTP Virtual Host - Port 80
# Handles ACME challenges and redirects to HTTPS
<VirtualHost *:80>
    ServerName ai-gateway.portal.chalmers.se
    DocumentRoot /var/www/html

    # Enable ACME challenge support for Let's Encrypt
    Alias /.well-known/acme-challenge /var/www/html/.well-known/acme-challenge
    <Directory "/var/www/html/.well-known/acme-challenge">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect all other traffic to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/ai-gateway-http-error.log
    CustomLog ${APACHE_LOG_DIR}/ai-gateway-http-access.log combined
</VirtualHost>

# HTTPS Virtual Host - Port 443
# TLS termination and reverse proxy to APISIX Gateway test environment
<VirtualHost *:443>
    ServerName ai-gateway.portal.chalmers.se

    # SSL Configuration (will be managed by Certbot)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/ai-gateway.portal.chalmers.se/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ai-gateway.portal.chalmers.se/privkey.pem

    # Modern SSL Security Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Block admin API access (belt-and-suspenders security)
    <LocationMatch "^/apisix/admin(/.*)?$">
        Require all denied
    </LocationMatch>

    # Reverse Proxy Configuration to APISIX Gateway test environment
    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy all requests to APISIX Gateway on localhost:9081 (test environment)
    ProxyPass / http://127.0.0.1:9081/
    ProxyPassReverse / http://127.0.0.1:9081/

    # OIDC-compatible proxy headers (FIXED)
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "%{Host}i"

    # Handle WebSocket connections (if needed)
    RewriteEngine On
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:9081/$1 [P,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/ai-gateway-https-error.log
    CustomLog ${APACHE_LOG_DIR}/ai-gateway-https-access.log combined

    # Log additional proxy information for debugging
    LogLevel warn
    LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\" %D" combined_with_time
    CustomLog ${APACHE_LOG_DIR}/ai-gateway-proxy.log combined_with_time
</VirtualHost>