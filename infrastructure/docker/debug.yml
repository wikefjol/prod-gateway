# Debug and Troubleshooting Services
# Enhanced containers with diagnostic tools

services:
  # Debug Toolkit - Network troubleshooting and testing
  debug-toolkit:
    image: nicolaka/netshoot:latest
    container_name: apisix-debug-toolkit
    profiles: ["debug"]
    networks:
      - apisix
    volumes:
      - ../../scripts/debug:/debug:ro
      - ../../logs:/logs
      - ../../config:/config:ro
    environment:
      # Configuration for debug scripts
      - APISIX_ADMIN_API=${APISIX_ADMIN_API:-http://apisix-dev:9180/apisix/admin}
      - ADMIN_KEY=${ADMIN_KEY}
      - OIDC_DISCOVERY_ENDPOINT=${OIDC_DISCOVERY_ENDPOINT}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME}
      - DATA_PLANE=${DATA_PLANE:-http://apisix-dev:9080}

      # Debug mode
      - DEBUG=true
    command: ["/bin/bash", "-c", "echo 'Debug toolkit started. Connect with: docker exec -it apisix-debug-toolkit bash' && sleep infinity"]
    restart: unless-stopped
    tty: true
    stdin_open: true

  # HTTP Test Client - For testing OIDC flows
  http-client:
    image: curlimages/curl:latest
    container_name: apisix-http-client
    profiles: ["debug"]
    networks:
      - apisix
    volumes:
      - ../../scripts/debug:/debug:ro
    environment:
      - APISIX_ADMIN_API=${APISIX_ADMIN_API:-http://apisix-dev:9180/apisix/admin}
      - ADMIN_KEY=${ADMIN_KEY}
      - DATA_PLANE=${DATA_PLANE:-http://apisix-dev:9080}
      - OIDC_DISCOVERY_ENDPOINT=${OIDC_DISCOVERY_ENDPOINT}
    command: ["/bin/sh", "-c", "echo 'HTTP client ready. Run tests with: docker exec -it apisix-http-client sh' && sleep infinity"]
    restart: unless-stopped
    tty: true
    stdin_open: true

  # Log Aggregator - Centralized logging
  log-viewer:
    image: busybox:latest
    container_name: apisix-log-viewer
    profiles: ["debug"]
    volumes:
      - apisix_logs:/apisix-logs:ro
      - ../../logs:/app-logs
    command: ["/bin/sh", "-c", "echo 'Log viewer started. View logs in /apisix-logs and /app-logs' && tail -f /dev/null"]
    restart: unless-stopped

  # Configuration Inspector - View current configs
  config-inspector:
    image: alpine:latest
    container_name: apisix-config-inspector
    profiles: ["debug"]
    networks:
      - apisix
    volumes:
      - ../../config:/config:ro
      - ../../secrets:/secrets:ro
      - ../../scripts/debug:/debug:ro
    environment:
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
    command: ["/bin/sh", "/debug/inspect-config.sh"]
    restart: "no"

networks:
  apisix:
    external: true

volumes:
  apisix_logs:
    external: false