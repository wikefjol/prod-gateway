networks:
  apisix-dev:
    driver: bridge

volumes:
  etcd_data_dev:
  apisix_logs_dev:

services:
  etcd-dev:
    image: bitnamilegacy/etcd:3.5.11
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-dev:2379
    volumes:
      - etcd_data_dev:/bitnami/etcd
    networks:
      - apisix-dev
    restart: unless-stopped

  apisix-dev:
    build:
      context: ./apisix
      dockerfile: Dockerfile
    depends_on:
      - etcd-dev
    networks:
      - apisix-dev
    ports:
      - "9080:9080"
      - "9180:9180"
    environment:
      - CUSTOM_PROFILE=dev
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - apisix_logs_dev:/usr/local/apisix/logs
    restart: unless-stopped
    container_name: apisix-dev

  keycloak-dev:
    image: quay.io/keycloak/keycloak:latest
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    networks:
      - apisix-dev
    command: ["start-dev"]
    restart: unless-stopped
    container_name: keycloak-dev

  loader-dev:
    image: curlimages/curl:latest
    depends_on:
      - apisix-dev
    networks:
      - apisix-dev
    env_file:
      - .dev.env
      - admin.env
    volumes:
      - ./:/opt/apisix-gateway:ro
    user: "364274:364274"  # Map to host user for proper permissions
    command: ["/bin/sh", "/opt/apisix-gateway/scripts/bootstrap-oidc-dev.sh"]
    restart: "no"

