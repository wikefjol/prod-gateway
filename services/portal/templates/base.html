<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Gateway Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/portal/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/portal/" class="logo-chip">
            <span class="logo-icon">AI</span>
            Gateway
        </a>
        <div class="nav-spacer"></div>
        <a href="/docs/" class="docs-link">Docs &#x2192;</a>
        {% if user_identity %}
        <span class="user-chip">{{ user_identity.user_email }}</span>
        {% endif %}
    </nav>

    <div class="page-container">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    {% block config_script %}{% endblock %}
    <script src="/portal/static/js/portal.js"></script>
</body>
</html>
