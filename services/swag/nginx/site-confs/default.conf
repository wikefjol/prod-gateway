# HTTP → HTTPS redirect (health check + ACME HTTP-01)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# Catch-all: reject requests with no matching server_name
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name _;

    include /config/nginx/ssl.conf;

    return 444;
}
