## Version 2026/03/04
# lamassu.ita.chalmers.se -> dev APISIX

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name lamassu.ita.chalmers.se;

    include /config/nginx/ssl.conf;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block admin API
    location /apisix/admin {
        return 403;
    }

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app apisix-dev;
        set $upstream_port 9080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Request ID
        proxy_set_header X-Request-Id $request_id;

        # Large OIDC callback headers from Microsoft
        proxy_buffer_size 128k;
        proxy_busy_buffers_size 256k;

        # SSE streaming support (proxy_read_timeout inherited from proxy.conf)
        proxy_buffering off;
        proxy_cache off;
    }
}
